# /*
#   Este arquivo define os serviços da aplicação usando Docker Compose.
#   - Configura o banco de dados PostgreSQL.
#   - Configura o frontend (React + Nginx).
#   - Define volumes para persistência de dados.
#   - Define rede interna para comunicação entre serviços.
# */

services:

  db:
    image: postgres:16-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: appdb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "80:80"

    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge